<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar – NoteNest</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/calendar.css" />

    <style>
        .app-header {
            display: flex;
            justify-content: flex-end;
            padding: 8px 12px;
            background: var(--titlebar);
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
        }
        .view-toggle {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--win-border);
            background: var(--win-bg2);
            color: var(--text2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Syne', sans-serif;
        }
        .view-toggle:hover {
            border-color: var(--accent2);
            color: var(--text1);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: var(--win-bg);
        }
        .app-container .cal-layout {
            flex: 1;
            min-height: 0;
        }

        /* Simple view: hide events */
        .app-container.simple-view .cal-events { display: none; }
        .app-container.simple-view .cal-grid {
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="app-container expanded-view">
    <div class="app-header">
        <button class="view-toggle" id="viewToggle">Switch to Simple View</button>
    </div>

    <div class="cal-layout">
        <div class="cal-header">
            <button class="cal-nav"><i class="fas fa-chevron-left"></i></button>
            <div class="cal-month">April <span class="cal-year">2026</span></div>
            <button class="cal-nav"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid">
            <div class="cal-weekdays">
                <div class="cal-wd">Su</div><div class="cal-wd">Mo</div>
                <div class="cal-wd">Tu</div><div class="cal-wd">We</div>
                <div class="cal-wd">Th</div><div class="cal-wd">Fr</div>
                <div class="cal-wd">Sa</div>
            </div>
            <div class="cal-days" id="calDays"></div>
        </div>
        <div class="cal-events">
            <div class="cal-event" style="border-color: var(--danger)">
                <div><div class="cal-event-text">Chem Lab Report Due</div></div>
                <span class="cal-event-time" style="color:var(--danger)">Overdue</span>
            </div>
            <div class="cal-event" style="border-color: var(--accent2)">
                <div><div class="cal-event-text">Physics Midterm Exam</div></div>
                <span class="cal-event-time">Apr 24</span>
            </div>
            <div class="cal-event" style="border-color: var(--accent)">
                <div><div class="cal-event-text">Math Assignment #5</div></div>
                <span class="cal-event-time">Apr 30</span>
            </div>
        </div>
    </div>
</div>

<script>
    const container = document.querySelector('.app-container');
    const toggleBtn = document.getElementById('viewToggle');

    function setView(mode) {
        if (mode === 'simple') {
            container.classList.remove('expanded-view');
            container.classList.add('simple-view');
            toggleBtn.textContent = 'Switch to Expanded View';
        } else {
            container.classList.remove('simple-view');
            container.classList.add('expanded-view');
            toggleBtn.textContent = 'Switch to Simple View';
        }
    }

    if (window.top !== window.self) setView('simple');
    else setView('expanded');

    toggleBtn.addEventListener('click', () => {
        if (container.classList.contains('simple-view')) setView('expanded');
        else setView('simple');
    });

    // Calendar render
    function renderCalendar() {
        const today = new Date(2026, 3, 18);
        const year = today.getFullYear(), month = today.getMonth();
        const first = new Date(year, month, 1).getDay();
        const days = new Date(year, month+1, 0).getDate();
        const grid = document.getElementById('calDays');
        grid.innerHTML = '';
        const events = [16, 24, 30];
        for (let i = 0; i < first; i++) {
            const d = document.createElement('div');
            d.className = 'cal-day other-month';
            d.innerHTML = `<span class="day-num">${new Date(year,month,0).getDate()-first+i+1}</span>`;
            grid.appendChild(d);
        }
        for (let d = 1; d <= days; d++) {
            const div = document.createElement('div');
            div.className = 'cal-day' + (d === today.getDate() ? ' today' : '');
            div.innerHTML = `<span class="day-num">${d}</span>${events.includes(d)?'<div class="day-dot"></div>':''}`;
            div.addEventListener('click', () => {
                document.querySelectorAll('.cal-day').forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
            });
            grid.appendChild(div);
        }
    }
    renderCalendar();
</script>
</body>
</html>
