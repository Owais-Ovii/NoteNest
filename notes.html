<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/page-style.css">
  <link rel="stylesheet" href="css/panel-utilities.css">
  <link rel="stylesheet" href="css/notes.css">
</head>
<body>
<div class="app-root">
  <button class="view-toggle" title="Toggle simple/expanded view">
    <i class="ri-expand-left-right-line"></i>
  </button>

  <div class="notes-grid">
    <!-- Tabs bar -->
    <div class="notes-tabs">
      <div class="subject-tab is-active"><span class="subject-tab__dot" style="background:#7c6af5"></span>Instance 1</div>
      <div class="subject-tab"><span class="subject-tab__dot" style="background:#c9a84c"></span>Instance 2</div>
      <div class="subject-tab"><span class="subject-tab__dot" style="background:#4caf82"></span>Instance 3</div>
      <div class="subject-tab"><span class="subject-tab__dot" style="background:#c95a5a"></span>Instance 4</div>
      <button class="notes-tabs__add" title="New instance"><i class="ri-add-line"></i></button>
    </div>

    <!-- Sidebar -->
    <div class="notes-sidebar">
      <div class="panel-header">
        <button class="icon-btn sidebar-toggle" title="Collapse sidebar"><i class="ri-side-bar-line"></i></button>
        <span class="label-caps" style="flex:1;">Sections</span>
        <button class="icon-btn sidebar-hide" title="Hide sidebar"><i class="ri-close-line"></i></button>
        <button class="icon-btn" title="Add section"><i class="ri-add-line"></i></button>
      </div>
      <div class="panel-scroll">
        <div class="list-row section-row is-active"><i class="ri-folder-open-line section-row__icon"></i><span class="section-row__name">All Notes</span><span class="badge badge--muted" id="section-all-count">12</span></div>
        <div class="list-row section-row"><i class="ri-flask-line section-row__icon"></i><span class="section-row__name">Organic</span><span class="badge badge--muted">5</span></div>
        <div class="list-row section-row"><i class="ri-test-tube-line section-row__icon"></i><span class="section-row__name">Inorganic</span><span class="badge badge--muted">4</span></div>
        <div class="list-row section-row"><i class="ri-fire-line section-row__icon"></i><span class="section-row__name">Thermo</span><span class="badge badge--muted">3</span></div>
        <div class="list-row section-row"><i class="ri-bookmark-line section-row__icon"></i><span class="section-row__name">Exam</span><span class="badge badge--muted">6</span></div>
      </div>
    </div>

    <!-- Note list + Editor -->
    <div class="notes-content">
      <div class="note-list">
        <div class="panel-header">
          <div class="field-row" style="flex:1;">
            <i class="ri-search-line" style="color:var(--text-muted);font-size:13px;flex-shrink:0;"></i>
            <input class="field-row__input" type="text" placeholder="Search notes…">
          </div>
        </div>
        <div class="panel-scroll" id="note-card-list"></div>
        <button class="note-list__new" id="new-note-btn"><i class="ri-add-line"></i> New Note</button>
      </div>
      <div class="note-editor">
        <div class="panel-header">
          <div class="editor-toolbar">
  <button class="icon-btn" type="button" data-command="bold" title="Bold"><b>B</b></button>
  <button class="icon-btn" type="button" data-command="italic" title="Italic"><i>I</i></button>
  <button class="icon-btn" type="button" data-command="underline" title="Underline" style="text-decoration:underline;">U</button>
  <span class="divider-v"></span>

  <!-- Heading dropdown -->
  <div class="heading-dropdown">
    <button class="icon-btn heading-btn" type="button" title="Heading">
      <i class="ri-heading"></i>
    </button>
    <div class="heading-options">
      <button type="button" data-command="formatBlock" data-value="h1">Heading 1</button>
      <button type="button" data-command="formatBlock" data-value="h2">Heading 2</button>
      <button type="button" data-command="formatBlock" data-value="h3">Heading 3</button>
      <button type="button" data-command="formatBlock" data-value="h4">Heading 4</button>
      <button type="button" data-command="formatBlock" data-value="h5">Heading 5</button>
      <button type="button" data-command="formatBlock" data-value="h6">Heading 6</button>
    </div>
  </div>

  <button class="icon-btn" type="button" data-command="insertUnorderedList" title="Bullet list"><i class="ri-list-unordered"></i></button>
  <button class="icon-btn" type="button" data-command="insertOrderedList" title="Numbered list"><i class="ri-list-ordered"></i></button>
  <span class="divider-v"></span>
  <button class="icon-btn" type="button" data-command="fontName" data-value="Courier New" title="Inline code"><i class="ri-code-line"></i></button>
  <button class="icon-btn" type="button" data-command="createLink" title="Insert link"><i class="ri-link"></i></button>

  <span class="divider-v"></span>
  <!-- Manual Summary Button -->
  <button class="icon-btn" type="button" id="manual-summary-btn" title="Manual Summary">
    <i class="ri-sticky-note-line"></i>
  </button>
</div>
          <div class="editor-actions">
            <button class="btn-outline btn-outline--gold" id="ask-ai-btn"><i class="ri-sparkling-2-line"></i> Ask AI</button>
            <button class="btn-outline btn-outline--subtle" id="edit-markup-btn"><i class="ri-code-s-slash-line"></i> Edit Markup</button>
            <button class="btn-solid btn-solid--violet" id="save-note-btn">Save</button>
          </div>
        </div>
        <div class="note-editor__head">
          <input class="note-editor__title" type="text" id="note-title-input" value="Reaction Mechanisms" placeholder="Note title…">
          <div class="note-editor__meta">
            <span class="label-micro"><i class="ri-calendar-line"></i> Apr 18, 2026 · 2:14 PM</span>
            <input class="note-editor__tag" type="text" id="note-tag-input" value="organic" placeholder="+ tag">
          </div>
        </div>
        <!-- ... (all preceding code unchanged) ... -->

<div class="note-editor__body">
  <!-- MARKUP EDITOR (hidden) -->
  <div id="markup-editor" class="markup-editor" style="display:none;">
    <textarea id="markup-textarea" class="markup-textarea" placeholder="Paste HTML here…"></textarea>
    <div class="markup-actions">
      <button id="markup-save" class="btn-solid btn-solid--violet">Save Markup</button>
      <button id="markup-cancel" class="btn-outline btn-outline--subtle">Cancel</button>
    </div>
  </div>

  <!-- SUMMARY MODAL (hidden) -->
  <div id="summary-modal" class="summary-modal" style="display:none;">
    <div class="summary-modal-overlay"></div>
    <div class="summary-modal-content">
      <div class="panel-header">
        <span class="label-caps">Write your summary</span>
        <button class="icon-btn" id="summary-modal-close" title="Cancel"><i class="ri-close-line"></i></button>
      </div>
      <textarea id="summary-textarea" class="summary-textarea" placeholder="Type your summary here…"></textarea>
      <div class="markup-actions">
        <button id="summary-save" class="btn-solid btn-solid--violet">Insert Summary</button>
        <button id="summary-cancel" class="btn-outline btn-outline--subtle">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Note iframe -->
  <iframe id="note-iframe" class="note-editor__content" title="Note content"></iframe>
</div>

<!-- ... (status bar and rest) ... -->
        <div class="panel-footer note-editor__status">
          <span class="pulse-dot pulse-dot--green"></span>
          <span id="status-text">All changes saved · 2:14 PM</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/notes.js"></script>
</body>
</html>
