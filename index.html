<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteNest</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/page-style.css" />
    <link rel="stylesheet" href="css/window.css" />
    <link rel="stylesheet" href="css/launcher.css" />

    <style>
        /* iframe specific overrides */
        .window-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--win-bg);
            display: block;
        }
        /* ensure the window body fills space */
        .window-body {
            padding: 0;
        }
    </style>
</head>
<body>

<div id="desktop">

    <!-- ═══ NOTES WINDOW ═══ -->
    <div class="window" id="win-notes" style="display:none; z-index:100; width:780px; height:560px; top:60px; left:80px;">
        <div class="window-titlebar" data-win="notes">
            <span class="win-icon"><i class="fas fa-pen-fancy"></i></span>
            <span class="win-title">Notes</span>
            <div class="win-controls">
                <button class="win-btn minimize" data-action="minimize" data-win="notes"><i class="fas fa-minus"></i></button>
                <button class="win-btn close" data-action="close" data-win="notes"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="notes.html" data-component="notes"></iframe>
        </div>
        <div class="resize-handle" data-win="notes"></div>
    </div>

    <!-- ═══ TODO WINDOW ═══ -->
    <div class="window" id="win-todo" style="display:none; z-index:100; width:340px; height:500px; top:60px; right:100px;">
        <div class="window-titlebar" data-win="todo">
            <span class="win-icon"><i class="fas fa-check-circle"></i></span>
            <span class="win-title">Planner</span>
            <div class="win-controls">
                <button class="win-btn minimize" data-action="minimize" data-win="todo"><i class="fas fa-minus"></i></button>
                <button class="win-btn close" data-action="close" data-win="todo"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="todo.html" data-component="todo"></iframe>
        </div>
        <div class="resize-handle" data-win="todo"></div>
    </div>

    <!-- ═══ CALENDAR WINDOW ═══ -->
    <div class="window" id="win-calendar" style="display:none; z-index:100; width:400px; height:420px; bottom:100px; left:80px;">
        <div class="window-titlebar" data-win="calendar">
            <span class="win-icon"><i class="fas fa-calendar-alt"></i></span>
            <span class="win-title">Calendar</span>
            <div class="win-controls">
                <button class="win-btn minimize" data-action="minimize" data-win="calendar"><i class="fas fa-minus"></i></button>
                <button class="win-btn close" data-action="close" data-win="calendar"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="calendar.html" data-component="calendar"></iframe>
        </div>
        <div class="resize-handle" data-win="calendar"></div>
    </div>

    <!-- ═══ AI WINDOW ═══ -->
    <div class="window" id="win-ai" style="display:none; z-index:100; width:380px; height:500px; bottom:60px; right:100px;">
        <div class="window-titlebar" data-win="ai">
            <span class="win-icon"><i class="fas fa-sparkles"></i></span>
            <span class="win-title">AI Assistant</span>
            <div class="win-controls">
                <button class="win-btn minimize" data-action="minimize" data-win="ai"><i class="fas fa-minus"></i></button>
                <button class="win-btn close" data-action="close" data-win="ai"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="window-body">
            <iframe src="ai.html" data-component="ai"></iframe>
        </div>
        <div class="resize-handle" data-win="ai"></div>
    </div>

    <!-- ═══ LAUNCHER PILL ═══ -->
    <div id="launcher">
        <div class="launcher-pill">
            <div class="launcher-handle" id="launcherHandle">
                <div class="handle-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>
            <div class="launcher-divider"></div>
            <button class="launch-btn" id="btn-notes" onclick="toggleWindow('notes')" title="Notes">
                <div class="lb-icon"><i class="fas fa-pen-fancy"></i></div>
                <div class="lb-label">Notes</div>
                <div class="active-dot"></div>
                <div class="tooltip">Notes</div>
            </button>
            <button class="launch-btn" id="btn-todo" onclick="toggleWindow('todo')" title="Planner">
                <div class="lb-icon"><i class="fas fa-check-circle"></i></div>
                <div class="lb-label">Planner</div>
                <div class="active-dot"></div>
                <div class="tooltip">Planner</div>
            </button>
            <button class="launch-btn" id="btn-calendar" onclick="toggleWindow('calendar')" title="Calendar">
                <div class="lb-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="lb-label">Calendar</div>
                <div class="active-dot"></div>
                <div class="tooltip">Calendar</div>
            </button>
            <button class="launch-btn" id="btn-ai" onclick="toggleWindow('ai')" title="AI Assistant">
                <div class="lb-icon"><i class="fas fa-sparkles"></i></div>
                <div class="lb-label">AI</div>
                <div class="active-dot"></div>
                <div class="tooltip">AI Assistant</div>
            </button>
            <div class="launcher-divider"></div>
            <button class="launch-btn" title="OCR Digitize" onclick="alert('OCR Digitizer — coming soon')">
                <div class="lb-icon"><i class="fas fa-camera"></i></div>
                <div class="lb-label">Scan</div>
                <div class="tooltip">Scan &amp; Digitize</div>
            </button>
        </div>
    </div>

</div><!-- /desktop -->

<script>
    /* ════════════════════════════════════════════
       WINDOW MANAGER (same as before)
       ════════════════════════════════════════════ */
    let zTop = 200;
    const wins = {
        notes:    { el: null, open: false, pos: {x:80, y:60} },
        todo:     { el: null, open: false, pos: {x: window.innerWidth - 440, y:60} },
        calendar: { el: null, open: false, pos: {x:80, y: window.innerHeight - 480} },
        ai:       { el: null, open: false, pos: {x: window.innerWidth - 480, y: window.innerHeight - 560} }
    };

    function initWindows() {
        for (const [id, w] of Object.entries(wins)) {
            w.el = document.getElementById('win-' + id);
            w.el.style.left = Math.max(0, w.pos.x) + 'px';
            w.el.style.top  = Math.max(0, w.pos.y) + 'px';
            w.el.addEventListener('mousedown', () => focusWindow(w.el));
            w.el.addEventListener('touchstart', () => focusWindow(w.el), {passive:true});
        }
        initDrag();
        initResize();
    }

    function focusWindow(el) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
        el.style.zIndex = ++zTop;
        el.classList.add('focused');
    }

    function toggleWindow(id) {
        const w = wins[id];
        const btn = document.getElementById('btn-' + id);
        if (!w.open) {
            w.el.style.display = 'flex';
            w.open = true;
            focusWindow(w.el);
            btn.classList.add('active', 'active-' + id);
            w.el.classList.remove('minimized');
        } else if (w.el.classList.contains('minimized')) {
            w.el.classList.remove('minimized');
            focusWindow(w.el);
        } else {
            w.el.style.display = 'none';
            w.open = false;
            btn.classList.remove('active', 'active-' + id);
        }
    }

    document.addEventListener('click', e => {
        const btn = e.target.closest('.win-btn');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.win;
        if (action === 'close') {
            wins[id].el.style.display = 'none';
            wins[id].open = false;
            document.getElementById('btn-' + id)?.classList.remove('active', 'active-' + id);
        } else if (action === 'minimize') {
            wins[id].el.classList.toggle('minimized');
        }
    });

    /* ── Drag ── */
    function initDrag() {
        document.querySelectorAll('.window-titlebar').forEach(bar => {
            let dragging = false, ox=0, oy=0;
            const win = bar.closest('.window');
            function onDown(e) {
                if (e.target.closest('.win-controls')) return;
                dragging = true;
                const rect = win.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                ox = cx - rect.left;
                oy = cy - rect.top;
                focusWindow(win);
                e.preventDefault();
            }
            function onMove(e) {
                if (!dragging) return;
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                const nx = Math.max(0, Math.min(window.innerWidth  - win.offsetWidth,  cx - ox));
                const ny = Math.max(0, Math.min(window.innerHeight - win.offsetHeight, cy - oy));
                win.style.left = nx + 'px';
                win.style.top  = ny + 'px';
            }
            function onUp() { dragging = false; }
            bar.addEventListener('mousedown', onDown);
            bar.addEventListener('touchstart', onDown, {passive:false});
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, {passive:false});
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchend', onUp);
        });
    }

    /* ── Resize ── */
    function initResize() {
        document.querySelectorAll('.resize-handle').forEach(handle => {
            let resizing = false, sx=0, sy=0, sw=0, sh=0;
            const win = handle.closest('.window');
            handle.addEventListener('mousedown', e => {
                resizing = true;
                sx = e.clientX; sy = e.clientY;
                sw = win.offsetWidth; sh = win.offsetHeight;
                e.preventDefault();
                focusWindow(win);
            });
            document.addEventListener('mousemove', e => {
                if (!resizing) return;
                const nw = Math.max(280, sw + (e.clientX - sx));
                const nh = Math.max(200, sh + (e.clientY - sy));
                win.style.width  = nw + 'px';
                win.style.height = nh + 'px';
            });
            document.addEventListener('mouseup', () => { resizing = false; });
        });
    }

    /* ── Launcher drag ── */
    function initLauncher() {
        const launcher = document.getElementById('launcher');
        const handle   = document.getElementById('launcherHandle');
        let dragging = false, ox=0, oy=0;
        function snap() {
            const r = launcher.getBoundingClientRect();
            const W = window.innerWidth, H = window.innerHeight;
            const margin = 60;
            let nx = r.left, ny = r.top;
            if (r.left < margin) nx = 10;
            if (r.right > W - margin) nx = W - r.width - 10;
            if (r.top < margin) ny = 10;
            if (r.bottom > H - margin) ny = H - r.height - 10;
            launcher.style.left = nx + 'px';
            launcher.style.top  = ny + 'px';
            launcher.style.bottom = 'auto';
            launcher.style.transform = 'none';
        }
        handle.addEventListener('mousedown', e => {
            dragging = true;
            const r = launcher.getBoundingClientRect();
            launcher.style.left = r.left + 'px';
            launcher.style.top  = r.top  + 'px';
            launcher.style.bottom = 'auto';
            launcher.style.transform = 'none';
            ox = e.clientX - r.left;
            oy = e.clientY - r.top;
            e.preventDefault();
        });
        handle.addEventListener('touchstart', e => {
            dragging = true;
            const r = launcher.getBoundingClientRect();
            launcher.style.left = r.left + 'px';
            launcher.style.top  = r.top  + 'px';
            launcher.style.bottom = 'auto';
            launcher.style.transform = 'none';
            ox = e.touches[0].clientX - r.left;
            oy = e.touches[0].clientY - r.top;
        }, {passive:false});
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            launcher.style.left = Math.max(0, Math.min(window.innerWidth  - launcher.offsetWidth,  e.clientX - ox)) + 'px';
            launcher.style.top  = Math.max(0, Math.min(window.innerHeight - launcher.offsetHeight, e.clientY - oy)) + 'px';
        });
        document.addEventListener('touchmove', e => {
            if (!dragging) return;
            launcher.style.left = Math.max(0, Math.min(window.innerWidth  - launcher.offsetWidth,  e.touches[0].clientX - ox)) + 'px';
            launcher.style.top  = Math.max(0, Math.min(window.innerHeight - launcher.offsetHeight, e.touches[0].clientY - oy)) + 'px';
        }, {passive:false});
        document.addEventListener('mouseup', () => { if(dragging){ dragging=false; snap(); } });
        document.addEventListener('touchend', () => { if(dragging){ dragging=false; snap(); } });
    }

    window.addEventListener('load', () => {
        initWindows();
        initLauncher();
        setTimeout(() => toggleWindow('notes'), 100);
        setTimeout(() => toggleWindow('todo'), 250);
    });
</script>
</body>
</html>
